<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sistema PAC — Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #F1EFE8; color: #2C2C2A; min-height: 100vh; }

  .topbar {
    background: #3C3489; height: 56px;
    display: flex; align-items: center; padding: 0 24px; gap: 16px;
    position: sticky; top: 0; z-index: 100;
  }
  .topbar-logo { font-size: 15px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .topbar-sub { font-size: 12px; color: rgba(255,255,255,0.55); border-left: 1px solid rgba(255,255,255,0.2); padding-left: 14px; }
  .topbar-spacer { flex: 1; }
  .topbar-usuario { display: flex; align-items: center; gap: 10px; font-size: 13px; color: rgba(255,255,255,0.85); }
  .avatar { width: 32px; height: 32px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: #fff; flex-shrink: 0; }
  .btn-logout { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; padding: 5px 12px; font-size: 12px; color: rgba(255,255,255,0.85); cursor: pointer; }
  .btn-logout:hover { background: rgba(255,255,255,0.2); }

  .layout { display: flex; min-height: calc(100vh - 56px); }

  .sidebar { width: 220px; background: #fff; border-right: 1px solid #D3D1C7; padding: 20px 0; flex-shrink: 0; }
  .nav-titulo { font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: #B4B2A9; padding: 0 18px 6px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 18px; font-size: 13px; color: #5F5E5A; text-decoration: none; border-left: 3px solid transparent; transition: all 0.12s; }
  .nav-item:hover { background: #F1EFE8; color: #2C2C2A; }
  .nav-item.ativo { background: #EEEDFE; color: #3C3489; border-left-color: #3C3489; font-weight: 500; }
  .nav-item svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; flex-shrink: 0; }

  .main { flex: 1; padding: 28px 32px; }
  .page-title { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .page-sub { font-size: 13px; color: #888780; margin-bottom: 24px; }

  .cards-resumo { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .card-resumo { background: #fff; border: 1px solid #D3D1C7; border-radius: 12px; padding: 20px; }
  .card-resumo-label { font-size: 12px; color: #888780; margin-bottom: 8px; }
  .card-resumo-valor { font-size: 28px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
  .card-resumo-detalhe { font-size: 12px; color: #B4B2A9; }
  .card-resumo.destaque { border-left: 4px solid #3C3489; }
  .card-resumo.alerta   { border-left: 4px solid #E24B4A; }
  .card-resumo.ok       { border-left: 4px solid #1D9E75; }
  .card-resumo.aviso    { border-left: 4px solid #BA7517; }

  .secao { background: #fff; border: 1px solid #D3D1C7; border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
  .secao-header { padding: 16px 20px; border-bottom: 1px solid #F1EFE8; display: flex; align-items: center; justify-content: space-between; }
  .secao-titulo { font-size: 14px; font-weight: 600; }
  .btn-link { font-size: 13px; color: #3C3489; background: none; border: none; cursor: pointer; text-decoration: none; }

  table { width: 100%; border-collapse: collapse; }
  th { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #888780; padding: 10px 20px; text-align: left; background: #FAFAF8; border-bottom: 1px solid #F1EFE8; }
  td { font-size: 13px; padding: 12px 20px; border-bottom: 1px solid #F8F7F4; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #FAFAF8; }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; }
  .badge-rascunho   { background: #F1EFE8; color: #5F5E5A; }
  .badge-submetida  { background: #E6F1FB; color: #0C447C; }
  .badge-aprovada   { background: #EAF3DE; color: #27500A; }
  .badge-reprovada  { background: #FCEBEB; color: #791F1F; }
  .badge-de_acordo  { background: #EAF3DE; color: #27500A; }
  .badge-priorizada { background: #FAEEDA; color: #633806; }
  .badge-homologada { background: #E1F5EE; color: #085041; }

  .vazio { text-align: center; padding: 48px 20px; color: #B4B2A9; }
  .vazio svg { width: 40px; height: 40px; stroke: #D3D1C7; fill: none; stroke-width: 1.5; margin-bottom: 12px; }
  .carregando { text-align: center; padding: 40px; color: #B4B2A9; font-size: 14px; }

  #nav-form { display: none; }
</style>
</head>
<body>


<form id="nav-form" method="get" target="_top">
  <input type="hidden" id="nav-page"  name="page"  value="">
  <input type="hidden" id="nav-token" name="token" value="">
</form>

<div class="topbar">
  <span class="topbar-logo">PAC</span>
  <span class="topbar-sub">Planejamento Anual de Contratações</span>

  <div style="display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:6px;padding:4px 10px;">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <select id="sel-exercicio" style="background:transparent;border:none;color:#fff;font-size:12px;font-weight:600;cursor:pointer;outline:none;padding:0 2px;" onchange="trocarExercicio(this.value)">
    </select>
  </div>
  <div class="topbar-spacer"></div>
  <div class="topbar-usuario">
    <div class="avatar" id="av">?</div>
    <div>
      <div style="font-weight:500" id="nome-usuario">Carregando...</div>
      <div style="font-size:11px;opacity:0.7" id="unidade-usuario"></div>
    </div>
    <button class="btn-logout" onclick="fazerLogout()">Sair</button>
  </div>
</div>


<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main">
    <div class="page-title">Painel geral</div>
    <div class="page-sub" id="subtitulo-pagina">Carregando...</div>
    <div class="cards-resumo" id="cards-resumo"><div class="carregando">Carregando...</div></div>
    <div class="secao">
      <div class="secao-header">
        <span class="secao-titulo">Demandas recentes</span>
        <a class="btn-link" id="link-ver-todas" href="#" onclick="navegar('demandas');return false;">Ver todas →</a>
      </div>
      <div id="tabela-demandas"><div class="carregando">Carregando...</div></div>
    </div>
  </main>
</div>

<script src="api.js"></script>
<script>
  const token  = localStorage.getItem('pac_token') || '';
  const appUrl = APPS_SCRIPT_URL;

  // ── Exercício ─────────────────────────────────────────────────────────────
  function getExercicio() { return sessionStorage.getItem('pac_exercicio') || ''; }
  function setExercicio(ano) { sessionStorage.setItem('pac_exercicio', String(ano)); }

  // O exercício selecionado fica apenas no sessionStorage do browser.
  // Cada chamada ao servidor envia o exercício explicitamente no payload.
  // O CONFIG da planilha NÃO é alterado — é somente leitura para o ano padrão.
  function trocarExercicio(ano) {
    setExercicio(ano);
    if (typeof recarregarDados === 'function') recarregarDados();
  }


  function popularSeletorExercicios(exercicioAtual) {
    const sel = document.getElementById('sel-exercicio');
    if (!sel) return;
    const anoBase = Number(exercicioAtual) || new Date().getFullYear();
    const anos = [];
    for (let a = anoBase - 3; a <= anoBase + 2; a++) anos.push(a);
    const atual = getExercicio() || exercicioAtual;
    sel.innerHTML = anos.map(a =>
      `<option value="${a}" style="background:#3C3489;color:#fff"${String(a)===String(atual)?' selected':''}>${a}</option>`
    ).join('');
    if (!getExercicio()) setExercicio(exercicioAtual);
  }

  // ── Navegação ─────────────────────────────────────────────────────────────
  function navegar(page, tk) {
    const t = tk || token;
    if (t) { try { localStorage.setItem('pac_token', t); } catch(e) {} }
    window.location.href = page + '.html';
  }

  function chamar(acao, params, callback, erroCallback) {
    google.script.run
      .withSuccessHandler(callback)
      .withFailureHandler(function(err) {
        if (erroCallback) erroCallback(err);
        else console.error('Erro em ' + acao + ':', err.message);
      })
      .chamarAcao(token, acao, JSON.stringify(params || {}));
  }

  // ── Menus ─────────────────────────────────────────────────────────────────
  const MENUS = {
    chefe_secao:  [{ label:'Início', page:'dashboard', icon:'home' }, { label:'Minhas demandas', page:'demandas', icon:'list' }],
    chefia:       [{ label:'Início', page:'dashboard', icon:'home' }, { label:'Minhas demandas', page:'demandas', icon:'list' }, { label:'Aprovar demandas', page:'aprovacoes', icon:'check' }, { label:'Orçamento', page:'orcamento', icon:'dollar' }],
    ord_despesas: [{ label:'Início', page:'dashboard', icon:'home' }, { label:'Aprovações', page:'aprovacoes', icon:'check' }, { label:'Orçamento', page:'orcamento', icon:'dollar' }, { label:'Prioridades GUT', page:'prioridades', icon:'star' }, { label:'Homologar plano', page:'homologacao', icon:'shield' }],
    licitacoes:   [{ label:'Início', page:'dashboard', icon:'home' }, { label:'Usuários', page:'admin', icon:'users' }, { label:'Todas as demandas', page:'demandas', icon:'list' }, { label:'Orçamento', page:'orcamento', icon:'dollar' }, { label:'Aprovações', page:'aprovacoes', icon:'check' }, { label:'Prioridades GUT', page:'prioridades', icon:'star' }, { label:'Homologar plano', page:'homologacao', icon:'shield' }],
  };
  const ICONS = {
    home:   '<path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>',
    list:   '<line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>',
    check:  '<path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>',
    dollar: '<line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>',
    star:   '<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>',
    shield: '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>',
    users:  '<path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/>',
  };

  // ── Inicialização ─────────────────────────────────────────────────────────
  if (!token) {
    navegar('login', '');
  } else {
    google.script.run
      .withSuccessHandler(function(resp) {
        if (!resp.ok) { navegar('login', ''); return; }
        const u = resp.usuario;

        document.getElementById('av').textContent = u.nome.charAt(0).toUpperCase();
        document.getElementById('nome-usuario').textContent = u.nome;
        document.getElementById('unidade-usuario').textContent = u.sigla || u.unidade;
        document.getElementById('subtitulo-pagina').textContent =
          'Bem-vindo(a), ' + u.nome.split(' ')[0] + ' · ' + rotularPapel(u.papel);

        const menus = MENUS[u.papel] || [];
        document.getElementById('sidebar').innerHTML =
          '<div class="nav-titulo" style="margin-top:8px">Menu</div>' +
          menus.map(m =>
            `<a class="nav-item${m.page==='dashboard'?' ativo':''}" href="#" onclick="navegar('${m.page}');return false;">
              <svg viewBox="0 0 24 24">${ICONS[m.icon]||''}</svg> ${m.label}
            </a>`
          ).join('');

        document.getElementById('link-ver-todas').setAttribute('onclick',
          "event.preventDefault(); navegar('demandas'); return false;");

        google.script.run
          .withSuccessHandler(function(cfg) {
            sessionStorage.setItem('pac_exercicio_atual', cfg.exercicio || new Date().getFullYear());
            popularSeletorExercicios(cfg.exercicio || new Date().getFullYear());
            recarregarDados();
          })
          .chamarAcao(token, 'get_config_exercicio', '{}');
      })
      .withFailureHandler(function(err) {
        document.getElementById('subtitulo-pagina').textContent = 'Erro ao carregar: ' + err.message;
      })
      .chamarAcao(token, 'dados_usuario', '{}');
  }

  function recarregarDados() {
    google.script.run
      .withSuccessHandler(function(resp) {
        if (!resp.ok) return;
        const demandas = resp.demandas || [];

        const total      = demandas.length;
        const submetidas = demandas.filter(d => d.status === 'submetida').length;
        const aprovadas  = demandas.filter(d => d.status === 'de_acordo').length;
        const reprovadas = demandas.filter(d => d.status === 'reprovada').length;
        const valorTotal = demandas.reduce((s,d) => s + Number(d.valor_estimado||0), 0);

        document.getElementById('cards-resumo').innerHTML = `
          <div class="card-resumo destaque">
            <div class="card-resumo-label">Total de demandas</div>
            <div class="card-resumo-valor">${total}</div>
            <div class="card-resumo-detalhe">exercício ${getExercicio()}</div>
          </div>
          <div class="card-resumo aviso">
            <div class="card-resumo-label">Aguardando aprovação</div>
            <div class="card-resumo-valor">${submetidas}</div>
            <div class="card-resumo-detalhe">demandas submetidas</div>
          </div>
          <div class="card-resumo ok">
            <div class="card-resumo-label">Aprovadas</div>
            <div class="card-resumo-valor">${aprovadas}</div>
            <div class="card-resumo-detalhe">com de acordo da chefia</div>
          </div>
          <div class="card-resumo alerta">
            <div class="card-resumo-label">Reprovadas</div>
            <div class="card-resumo-valor">${reprovadas}</div>
            <div class="card-resumo-detalhe">necessitam revisão</div>
          </div>
          <div class="card-resumo">
            <div class="card-resumo-label">Valor estimado total</div>
            <div class="card-resumo-valor" style="font-size:20px">R$ ${fmtValor(valorTotal)}</div>
            <div class="card-resumo-detalhe">soma das demandas</div>
          </div>`;

        const recentes = demandas
          .sort((a,b) => new Date(b.data_ultima_atualizacao) - new Date(a.data_ultima_atualizacao))
          .slice(0, 8);

        if (recentes.length === 0) {
          document.getElementById('tabela-demandas').innerHTML =
            '<div class="vazio"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><p>Nenhuma demanda encontrada</p></div>';
          return;
        }

        document.getElementById('tabela-demandas').innerHTML = `
          <table>
            <thead><tr><th>Objeto</th><th>Unidade</th><th>Valor estimado</th><th>Status</th><th>Atualizado em</th></tr></thead>
            <tbody>${recentes.map(d => `
              <tr>
                <td>${truncar(d.descricao_objeto, 55)}</td>
                <td>${d.nome_unidade || '—'}</td>
                <td>R$ ${fmtValor(Number(d.valor_estimado||0))}</td>
                <td><span class="badge badge-${d.status}">${d.status}</span></td>
                <td>${fmtData(d.data_ultima_atualizacao)}</td>
              </tr>`).join('')}
            </tbody>
          </table>`;
      })
      .withFailureHandler(function(err) {
        document.getElementById('tabela-demandas').innerHTML =
          '<div class="carregando">Erro ao carregar demandas: ' + err.message + '</div>';
      })
      .chamarAcao(token, 'listar_demandas', JSON.stringify({ exercicio: getExercicio() }));
  }

  function fazerLogout() {
    google.script.run.chamarAcao(token, 'logout', '{}');
    try { localStorage.removeItem('pac_token'); } catch(e) {}
    navegar('login', '');
  }

  function fmtValor(v) { return v.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
  function fmtData(iso) { if (!iso) return '—'; try { return new Date(iso).toLocaleDateString('pt-BR'); } catch { return '—'; } }
  function truncar(str, n) { if (!str) return '—'; return str.length > n ? str.slice(0, n) + '…' : str; }
  function rotularPapel(p) {
    return { ord_despesas:'Ordenador de Despesas', chefia:'Chefia Intermediária', chefe_secao:'Chefe de Seção', licitacoes:'Seção de Licitações' }[p] || p;
  }
</script>
</body>
</html>
